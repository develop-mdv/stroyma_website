<ul>
    {% for product in products %}
        <li>
            <a href="{% url 'product_detail' pk=product.pk %}">{{ product.name }}</a>
            <p>{{ product.description }}</p>
            <p>Цена: {{ product.price }} руб.</p>
            <p>На складе: {{ product.stock }} шт.</p>
            {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.name }}" width="100">
            {% endif %}
        </li>
    {% empty %}
        <li>Товаров не найдено.</li>
    {% endfor %}
</ul>
