{% extends 'products/base.html' %}
{% block title %}Заказ успешно оформлен | СтройМа{% endblock %}

{% block content %}
<div class="bg-[#F8F5EF] dark:bg-gray-900 min-h-screen flex items-center justify-center py-16 md:py-32 px-4 sm:px-8 relative overflow-hidden">

    <!-- Декоративные элементы фона -->
    <div class="absolute top-1/4 left-4 md:left-10 w-[60vw] max-w-[500px] aspect-square border border-gray-300 dark:border-gray-700 rounded-full opacity-20 pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-4 md:right-10 w-[90vw] max-w-[800px] aspect-square border border-gray-300 dark:border-gray-700 rounded-full opacity-20 pointer-events-none"></div>

    <div class="max-w-[60rem] mx-auto text-center relative z-10 w-full">
        <!-- Анимация галочки -->
        <div class="mx-auto w-28 h-28 sm:w-32 sm:h-32 md:w-48 md:h-48 bg-white/60 dark:bg-gray-800/60 backdrop-blur-3xl border border-white/40 dark:border-gray-700/50 rounded-[2rem] md:rounded-[4rem] flex items-center justify-center mb-8 md:mb-12 shadow-2xl shadow-deep-green/10 transform rotate-[-10deg] hover:rotate-0 transition-transform duration-700">
            <i class="fas fa-check text-4xl sm:text-5xl md:text-7xl text-deep-green dark:text-emerald-400"></i>
        </div>

        <h1 class="clamp-hero font-bold font-display tracking-tight leading-[1] text-gray-900 dark:text-white uppercase mb-6 md:mb-8 break-words">
            Оформлен!
        </h1>

        <p class="text-base sm:text-xl md:text-2xl text-gray-500 dark:text-gray-400 font-light max-w-2xl mx-auto mb-10 md:mb-16 leading-relaxed">
            Мы получили ваш заказ. Наш менеджер уже изучает заявку и свяжется с вами в ближайшее время для подтверждения.
        </p>

        <div class="flex flex-col sm:flex-row justify-center gap-4 sm:gap-6">
            <a href="{% url 'product_list' %}" class="bg-gray-900 text-white dark:bg-white dark:text-gray-900 py-5 md:py-6 px-8 md:px-12 text-sm md:text-base font-bold uppercase tracking-[0.2em] hover:bg-deep-green dark:hover:bg-emerald-400 dark:hover:text-gray-900 transition-all duration-300 flex items-center justify-center gap-4 group/btn hover:scale-[1.02] shadow-2xl min-h-[56px]">
                Каталог
                <i class="fas fa-arrow-right transform group-hover/btn:translate-x-2 transition-transform"></i>
            </a>
            <a href="{% url 'product_list' %}" class="bg-transparent border-2 border-gray-900 text-gray-900 dark:border-gray-700 dark:text-white py-5 md:py-6 px-8 md:px-12 text-sm md:text-base font-bold uppercase tracking-[0.2em] hover:bg-gray-900 hover:text-white dark:hover:border-white dark:hover:bg-white dark:hover:text-gray-900 transition-all duration-300 flex items-center justify-center group/home min-h-[56px]">
                На главную
            </a>
        </div>
    </div>
</div>
{% endblock %}
