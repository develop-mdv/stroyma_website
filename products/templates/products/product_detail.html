<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Детальный просмотр товара</title>
</head>
<body>
    <h1>{{ product.name }}</h1>
    <img src="{{ product.image.url }}" alt="{{ product.name }}" width="200">
    <p><strong>Описание:</strong> {{ product.description }}</p>
    <p><strong>Цена:</strong> {{ product.price }} руб.</p>
    <p><strong>На складе:</strong> {{ product.stock }} шт.</p>
    <a href="{% url 'product_list' %}">Вернуться к каталогу</a>
    <br>
    <a href="{% url 'add_to_cart' pk=product.pk %}">Добавить в корзину</a>
</body>
</html>
