{% extends 'products/base.html' %}
{% block content %}
<div class="bg-white rounded-lg shadow-lg p-6 max-w-md mx-auto border border-gray-200 dark:border-gray-600">
    <h2 class="text-2xl font-bold text-deep-green mb-6">Вход</h2>
    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div>
            <label for="{{ form.username.id_for_label }}" class="block text-sm font-medium text-gray">Имя пользователя</label>
            <input type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}"
                   value="{{ form.username.value|default_if_none:'' }}"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-deep-green focus:ring-deep-green dark:bg-input-bg dark:border-input-border">
            {% if form.username.errors %}
                <div class="error-message">{{ form.username.errors }}</div>
            {% endif %}
        </div>
        <div>
            <label for="{{ form.password.id_for_label }}" class="block text-sm font-medium text-gray">Пароль</label>
            <input type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-deep-green focus:ring-deep-green dark:bg-input-bg dark:border-input-border">
            {% if form.password.errors %}
                <div class="error-message">{{ form.password.errors }}</div>
            {% endif %}
        </div>
        <button type="submit" class="button bg-deep-green text-white shadow-hover w-full">
            Войти
        </button>
    </form>
    <div class="mt-4 text-center">
        <a href="{% url 'register' %}" class="text-deep-green hover:text-gray-600 transition">Регистрация</a>
    </div>
</div>
{% endblock %}
