{% extends 'products/base.html' %}
{% block content %}
<div class="container py-5">
    <h2 class="mb-4">Редактирование профиль</h2>

    <form method="post" class="shadow-sm p-4 rounded bg-light">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger mt-1">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-success">Сохранить изменения</button>
        <a href="{% url 'profile' %}" class="btn btn-outline-secondary ms-2">Отмена</a>
    </form>
</div>
{% endblock %}
