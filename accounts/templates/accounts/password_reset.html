{% extends 'products/base.html' %}
{% block content %}
<div class="bg-white rounded-lg shadow-lg p-6 max-w-md mx-auto border border-gray-200 dark:border-gray-600">
    <h2 class="text-2xl font-bold text-deep-green mb-6">Восстановление пароля</h2>
    <p class="mb-4 text-gray">Введите адрес электронной почты, и мы отправим вам инструкции по восстановлению пароля.</p>
    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div>
            <label for="{{ form.email.id_for_label }}" class="block text-sm font-medium text-gray">Email</label>
            <input type="email" name="{{ form.email.name }}" id="{{ form.email.id_for_label }}"
                   value="{{ form.email.value|default_if_none:'' }}"
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-deep-green focus:ring-deep-green dark:bg-input-bg dark:border-input-border">
            {% if form.email.errors %}
                <div class="error-message">{{ form.email.errors }}</div>
            {% endif %}
        </div>
        <button type="submit" class="button bg-deep-green text-white shadow-hover w-full">
            Отправить инструкции
        </button>
    </form>
    <div class="mt-4 text-center">
        <a href="{% url 'login' %}" class="text-deep-green hover:text-gray-600 transition">Вернуться на страницу входа</a>
    </div>
</div>
{% endblock %}
