{% extends 'products/base.html' %}
{% block content %}

<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="w-full max-w-lg">
        
        <!-- Успех -->
        <div class="text-center mb-10 animate-fade-in">
            <div class="w-24 h-24 bg-green-50 dark:bg-emerald-900/20 rounded-full flex items-center justify-center mx-auto mb-8 shadow-soft">
                <i class="fas fa-check text-deep-green dark:text-emerald-400 text-4xl"></i>
            </div>
            <h1 class="text-3xl md:text-4xl font-black font-display text-gray-900 dark:text-white uppercase tracking-tight mb-3">
                Пароль изменён
            </h1>
            <p class="text-gray-500 dark:text-gray-400 font-light max-w-sm mx-auto">
                Ваш пароль был успешно обновлён. Теперь вы можете войти в свой аккаунт с новым паролем.
            </p>
        </div>

        <!-- Кнопка входа -->
        <div class="bg-white/70 dark:bg-gray-900/70 backdrop-blur-2xl border border-gray-100 dark:border-gray-800 rounded-[2rem] p-8 md:p-10 shadow-lift text-center">
            <a href="{% url 'login' %}" class="inline-flex items-center gap-2 bg-gray-900 dark:bg-white text-white dark:text-gray-900 py-4 px-10 rounded-xl text-[0.65rem] font-bold uppercase tracking-widest hover:bg-deep-green hover:text-white transition-colors duration-300 shadow-md group">
                Войти <i class="fas fa-arrow-right group-hover:translate-x-1 transition-transform text-xs"></i>
            </a>
        </div>
        
    </div>
</div>

{% endblock %}

{% block title %}Пароль изменён — СтройМА{% endblock %}
